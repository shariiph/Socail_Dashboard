# Deploy the Next.js dashboard from the monorepo root.
# Set in Netlify → Site settings → Environment variables:
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY

[build]
  base = "web-dashboard"
  command = "npm install && npm run build"
  # Do not set publish = ".next" here. @netlify/plugin-nextjs sets the correct deploy output;
  # forcing .next often breaks /_next/static (CSS/JS) and leaves the app unstyled.

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
